[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["signaling-server/**", "package.json", "Dockerfile"]

[deploy]
startCommand = "node signaling-server/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
DATA_DIR = "/web"

[[deploy.volumes]]
name = "cube-data"
mountPath = "/web"